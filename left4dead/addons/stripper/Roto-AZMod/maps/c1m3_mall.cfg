		"OnPressed" "panic_timer,Disable,,0.01,-1"
	}
	insert:
	{
		"OnPressed" "prop_alarm_controls,StopGlowing,,0,-1"
		"OnPressed" "panic_forever_timer,Disable,,0.01,-1"
	}
}

